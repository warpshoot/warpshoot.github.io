<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>wpy</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root { --font: "Press Start 2P", "Courier New", ui-monospace, monospace; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #010301;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #root {
      position: fixed; inset: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 45%, #10231a 0%, #060d09 75%);
      color: #6fffa8;
      font-family: var(--font);
      text-align: center;
      cursor: pointer;
      touch-action: none;
      /* CRT 管面: 角丸 + 内側の暗がりで樽型のふくらみを演出 */
      border-radius: 2.4vmin;
      box-shadow: inset 0 0 14vmin rgba(0, 0, 0, 0.9);
    }

    #game { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3.2vmin;
      pointer-events: none;
      z-index: 3;
    }
    .hidden { display: none; }

    .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0px, rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.38) 3px, rgba(0, 0, 0, 0.38) 4px
      );
      pointer-events: none;
      z-index: 10;
      border-radius: inherit;
    }

    /* アパーチャーグリル風の RGB 縦マスク(色収差・粒状感) */
    .aperture {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: multiply;
      opacity: 0.5;
      background: repeating-linear-gradient(
        90deg,
        rgba(0, 0, 0, 0) 0px, rgba(0, 0, 0, 0) 2px,
        rgba(2, 18, 10, 0.4) 2px, rgba(2, 18, 10, 0.4) 3px
      );
      border-radius: inherit;
    }

    /* 周辺減光(ビネット): 四隅を暗く落として管面のふくらみを補強 */
    .vignette {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 11;
      background: radial-gradient(ellipse at 50% 50%,
        rgba(0, 0, 0, 0) 52%, rgba(0, 0, 0, 0.55) 100%);
      border-radius: inherit;
    }

    /* ローリングスキャンライン: 明るい帯がゆっくり縦に流れる */
    .roll {
      position: absolute; left: 0; right: 0; top: 0;
      height: 24%;
      pointer-events: none;
      z-index: 12;
      background: linear-gradient(to bottom,
        rgba(200, 255, 220, 0) 0%,
        rgba(200, 255, 220, 0.07) 50%,
        rgba(200, 255, 220, 0) 100%);
      animation: roll 7.5s linear infinite;
    }
    @keyframes roll {
      0% { transform: translateY(-120%); }
      100% { transform: translateY(520%); }
    }

    /* 電源ON演出: 細い光の線が広がって収束する */
    .power {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 20;
      background: #eafff2;
      transform-origin: center;
      animation: power 0.95s ease-out forwards;
    }
    @keyframes power {
      0%   { opacity: 1; transform: scaleY(0.015); filter: brightness(3); }
      9%   { opacity: 1; transform: scaleY(0.02); }
      45%  { opacity: 0.35; transform: scaleY(1); }
      100% { opacity: 0; transform: scaleY(1); }
    }

    #title { animation: flicker 4s steps(2) infinite; }
    @keyframes flicker { 0%, 96% { opacity: 1; } 98% { opacity: 0.88; } 100% { opacity: 1; } }

    .hud {
      position: absolute; top: 3.5%; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 0 5%;
      font-size: clamp(7px, 1.8vmin, 12px);
      letter-spacing: 0.1em;
      opacity: 0.85;
    }
    .logo {
      font-size: clamp(46px, 15vmin, 160px);
      letter-spacing: 0.06em;
      line-height: 1;
      color: #aaffcf;
      /* グロー + 緑ゴースト(暗緑を左・明緑を右にずらして二重像に) */
      text-shadow:
        -2px 0 rgba(47, 174, 110, 0.55),
        2px 0 rgba(200, 255, 227, 0.55),
        0 0 8px rgba(111, 255, 168, 0.9),
        0 0 32px rgba(111, 255, 168, 0.45),
        4px 4px 0 #0e5c33;
      animation: logo-pulse 2.4s ease-in-out infinite;
    }
    @keyframes logo-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .sub {
      font-size: clamp(7px, 1.9vmin, 14px);
      letter-spacing: 0.16em;
      text-indent: 0.16em;
      opacity: 0.9;
    }
    .press {
      font-size: clamp(9px, 2.2vmin, 17px);
      letter-spacing: 0.16em;
      text-indent: 0.16em;
      animation: blink 1.1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .coin {
      font-size: clamp(7px, 1.6vmin, 11px);
      letter-spacing: 0.14em;
      opacity: 0.55;
    }
    .copyright {
      position: absolute; bottom: 3.5%; left: 0; right: 0;
      font-size: clamp(7px, 1.6vmin, 11px);
      letter-spacing: 0.12em;
      opacity: 0.6;
    }

    #gameover .go-main {
      font-size: clamp(24px, 8vmin, 90px);
      letter-spacing: 0.06em;
      color: #aaffcf;
      text-shadow:
        -2px 0 rgba(47, 174, 110, 0.55),
        2px 0 rgba(200, 255, 227, 0.55),
        0 0 12px rgba(111, 255, 168, 0.9),
        0 0 32px rgba(111, 255, 168, 0.45),
        3px 3px 0 #0e5c33;
    }
    #gameover .go-cause {
      font-size: clamp(8px, 2vmin, 15px);
      letter-spacing: 0.12em;
      line-height: 1.6;
      color: #d7ffe8;
    }
    #gameover .go-score {
      font-size: clamp(8px, 2vmin, 15px);
      letter-spacing: 0.12em;
    }
    #gameover .go-tip {
      font-size: clamp(7px, 1.6vmin, 11px);
      letter-spacing: 0.1em;
      line-height: 1.6;
      opacity: 0.6;
    }
    #gameover .go-continue {
      margin-top: 2vmin;
      font-size: clamp(10px, 2.4vmin, 18px);
      letter-spacing: 0.16em;
      animation: blink 1.1s steps(1) infinite;
    }

    .zap { animation: zap-flash 0.35s steps(2); }
    @keyframes zap-flash { 0% { filter: invert(1); } 100% { filter: none; } }
  </style>
</head>

<body>
  <div id="root">
    <canvas id="game"></canvas>

    <div id="title" class="overlay">
      <div class="hud"><span id="t-score">1UP&nbsp;&nbsp;000000</span><span>HI-SCORE&nbsp;&nbsp;300000</span></div>
      <div class="logo">WPY</div>
      <div class="sub">GALACTIC WARP SHOOTING</div>
      <div class="press">PRESS START</div>
      <div class="coin">INSERT COIN — TAP ANYWHERE</div>
      <div class="copyright">&copy; 2026 WPY CO.,LTD. &nbsp; CREDIT <span id="credit">00</span></div>
    </div>

    <div id="gameover" class="overlay hidden">
      <div class="go-main">GAME OVER</div>
      <div class="go-cause" id="go-cause"></div>
      <div class="go-score" id="go-score"></div>
      <div class="go-tip" id="go-tip"></div>
      <div class="go-continue">CONTINUE? <span id="go-count">9</span></div>
    </div>

    <div class="aperture"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>
    <div class="roll"></div>
    <div class="power"></div>
  </div>

  <script>
    (() => {
      const root = document.getElementById("root");
      const cv = document.getElementById("game");
      const ctx = cv.getContext("2d");
      const titleEl = document.getElementById("title");
      const goEl = document.getElementById("gameover");
      const el = id => document.getElementById(id);

      /* ---------- canvas setup ---------- */
      let W = 0, H = 0, dpr = 1;
      function resize() {
        dpr = Math.min(devicePixelRatio || 1, 2);
        W = root.clientWidth; H = root.clientHeight;
        cv.width = W * dpr; cv.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      addEventListener("resize", resize);

      /* ---------- boss sprite (favicon をラインアート化) ---------- */
      // favicon は「黒い線 + 白い塗り + 透過背景」。単色で塗りつぶすと
      // ベタ塗りに見えるので、明度を反転して「明るい線 / 暗い塗り」にする。
      const icon = new Image();
      icon.src = "favicon.png";
      let bossImg = null, bossFlashImg = null;
      function buildBossSprite() {
        const bright = [170, 255, 207];  // 線
        const dark = [8, 34, 22];        // 塗り
        const c = document.createElement("canvas");
        c.width = c.height = 64;
        const g = c.getContext("2d");
        g.drawImage(icon, 0, 0);
        const im = g.getImageData(0, 0, 64, 64), d = im.data;
        for (let i = 0; i < d.length; i += 4) {
          if (!d[i + 3]) continue;
          const L = 1 - (d[i] * 0.299 + d[i + 1] * 0.587 + d[i + 2] * 0.114) / 255;
          d[i] = dark[0] + (bright[0] - dark[0]) * L;
          d[i + 1] = dark[1] + (bright[1] - dark[1]) * L;
          d[i + 2] = dark[2] + (bright[2] - dark[2]) * L;
        }
        g.putImageData(im, 0, 0);
        bossImg = c;

        // 被弾フラッシュ用: 同じシルエットを真っ白で塗ったもの
        const fc = document.createElement("canvas");
        fc.width = fc.height = 64;
        const fg = fc.getContext("2d");
        fg.drawImage(icon, 0, 0);
        const fim = fg.getImageData(0, 0, 64, 64), fd = fim.data;
        for (let i = 0; i < fd.length; i += 4) {
          if (!fd[i + 3]) continue;
          fd[i] = 255; fd[i + 1] = 255; fd[i + 2] = 255;
        }
        fg.putImageData(fim, 0, 0);
        bossFlashImg = fc;
      }
      if (icon.complete) buildBossSprite();
      else icon.onload = buildBossSprite;

      /* ---------- state ---------- */
      let state = "title";       // title | ready | play | dying | gameover
      let now = 0, last = 0;
      let credits = 0, lastScore = 0;

      const stars = [];
      for (let i = 0; i < 90; i++) {
        stars.push({ x: Math.random(), y: Math.random(), s: 0.4 + Math.random() * 1.8 });
      }

      const player = { x: 0, y: 0, px: 0, w: 44 };
      let bullets = [], enemies = [], ebullets = [], particles = [], score = 0;
      let phase, tPlay, warningAt, bossAt, fireAt, spawnAt;
      let boss, shake = 0, flashA = 0, readyAt, goShownAt;
      let goTimer = null;

      const TIPS = [
        "TIP: YOU CANNOT WIN.",
        "TIP: TRY AGAIN. RESULT IS SAME.",
        "TIP: THE ENDING DOES NOT EXIST.",
        "TIP: THE BOSS HAS TOO MUCH HP.",
        "TIP: YOUR EFFORT WAS RECORDED. NOWHERE.",
        "TIP: STAGE 2 IS A MYTH.",
      ];

      const pad = (n, l = 6) => String(Math.min(n, 999999)).padStart(l, "0");

      // canvas 描画用フォント(CSS 側と揃える)。Web フォント読込前は Courier に自動フォールバック。
      const FONT = '"Press Start 2P", "Courier New", monospace';
      if (document.fonts && document.fonts.load) {
        document.fonts.load('16px "Press Start 2P"').catch(() => {});
      }

      /* ---------- flow ---------- */
      function startGame() {
        credits = Math.min(credits + 1, 99);
        el("credit").textContent = pad(credits, 2);
        root.classList.remove("zap");
        void root.offsetWidth;
        root.classList.add("zap");

        titleEl.classList.add("hidden");
        bullets = []; enemies = []; ebullets = []; particles = [];
        score = 0; shake = 0; flashA = 0;
        boss = null;
        player.x = W / 2; player.y = H * 0.8; player.px = player.x;
        state = "ready";
        readyAt = now;
      }

      function beginPlay() {
        state = "play";
        phase = "zako";
        tPlay = now;
        fireAt = now;
        spawnAt = now + 600;
        warningAt = now + 9000 + Math.random() * 2000;
        bossAt = 0;
      }

      function kill(cause) {
        if (state !== "play") return;
        state = "dying";
        shake = 22;
        flashA = 0.9;
        lastScore = score;
        for (let i = 0; i < 42; i++) {
          const a = Math.random() * Math.PI * 2, v = 1 + Math.random() * 6;
          particles.push({
            x: player.x, y: player.y,
            vx: Math.cos(a) * v, vy: Math.sin(a) * v,
            life: 40 + Math.random() * 40,
            c: ["#aaffcf", "#eafff2", "#7cffb0", "#2fae6e"][i % 4],
            s: 2 + Math.random() * 4,
          });
        }
        setTimeout(() => showGameOver(cause), 1300);
      }

      function showGameOver(cause) {
        state = "gameover";
        goShownAt = now;
        el("go-cause").textContent = cause;
        el("go-score").textContent = "SCORE  " + pad(score);
        el("go-tip").textContent = TIPS[Math.floor(Math.random() * TIPS.length)];
        goEl.classList.remove("hidden");
        let count = 9;
        el("go-count").textContent = count;
        clearInterval(goTimer);
        goTimer = setInterval(() => {
          count--;
          if (count < 0) { backToTitle(); return; }
          el("go-count").textContent = count;
        }, 1000);
      }

      function backToTitle() {
        clearInterval(goTimer);
        goEl.classList.add("hidden");
        el("t-score").innerHTML = "1UP&nbsp;&nbsp;" + pad(lastScore);
        titleEl.classList.remove("hidden");
        state = "title";
      }

      /* ---------- input ---------- */
      const keys = {};
      addEventListener("keydown", e => {
        keys[e.key] = true;
        if (state === "title" && (e.key === " " || e.key === "Enter")) startGame();
        else if (state === "gameover" && now - goShownAt > 600 && (e.key === " " || e.key === "Enter")) backToTitle();
      });
      addEventListener("keyup", e => { keys[e.key] = false; });

      let dragging = false, lastPX = 0, lastPY = 0;
      root.addEventListener("pointerdown", e => {
        e.preventDefault();
        if (state === "title") { startGame(); return; }
        if (state === "gameover" && now - goShownAt > 600) { backToTitle(); return; }
        dragging = true;
        lastPX = e.clientX; lastPY = e.clientY;
      });
      root.addEventListener("pointermove", e => {
        if (state !== "play") return;
        if (e.pointerType === "mouse" && !dragging) {
          player.x += (e.clientX - player.x) * 0.3;
          player.y += (Math.max(e.clientY, H * 0.45) - player.y) * 0.3;
        } else if (dragging) {
          // タッチはドラッグ量で相対移動(指で隠れないように)
          player.x += (e.clientX - lastPX) * 1.5;
          player.y += (e.clientY - lastPY) * 1.5;
          lastPX = e.clientX; lastPY = e.clientY;
        }
      });
      addEventListener("pointerup", () => { dragging = false; });
      addEventListener("pointercancel", () => { dragging = false; });

      /* ---------- game logic ---------- */
      function spawnEnemy() {
        const type = Math.random() < 0.6 ? 0 : 1; // 0: ダート 1: ドローン
        enemies.push({
          type,
          x: 40 + Math.random() * (W - 80),
          y: -30,
          vy: type === 0 ? 2.2 + Math.random() * 1.4 : 1.2 + Math.random() * 0.8,
          ph: Math.random() * Math.PI * 2,
          size: type === 0 ? 24 + Math.random() * 8 : 28 + Math.random() * 10,
        });
      }

      function explode(x, y, color, n = 14) {
        for (let i = 0; i < n; i++) {
          const a = Math.random() * Math.PI * 2, v = 0.5 + Math.random() * 4;
          particles.push({
            x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
            life: 20 + Math.random() * 25, c: color, s: 1.5 + Math.random() * 3,
          });
        }
      }

      function updatePlay() {
        // 移動(キー)
        const sp = 6;
        if (keys.ArrowLeft || keys.a) player.x -= sp;
        if (keys.ArrowRight || keys.d) player.x += sp;
        if (keys.ArrowUp || keys.w) player.y -= sp;
        if (keys.ArrowDown || keys.s) player.y += sp;
        player.x = Math.max(24, Math.min(W - 24, player.x));
        player.y = Math.max(H * 0.4, Math.min(H - 40, player.y));

        // 自動連射
        if (now >= fireAt) {
          bullets.push({ x: player.x - 7, y: player.y - 18 });
          bullets.push({ x: player.x + 7, y: player.y - 18 });
          fireAt = now + 150;
        }
        bullets.forEach(b => b.y -= 10);
        bullets = bullets.filter(b => b.y > -20);

        // フェーズ進行
        if (phase === "zako" && now >= warningAt) {
          phase = "warning";
          bossAt = now + 2600;
          shake = Math.max(shake, 4);
        }
        if (phase === "warning" && now >= bossAt) {
          phase = "boss";
          boss = {
            y: -Math.min(W, H) * 0.35,
            size: Math.min(W, H) * 0.5,
            hp: 1,
            arrived: 0,
            fireAt: 0,
            rage: 0,      // 0:希望(HPが減る) 1:勝利の錯覚 2:チャージ 3:ビーム 4:弾幕
            rageAt: 0,
            beamAng: 0, beamOx: 0, beamOy: 0,
            barrier: false, barrierAt: 0, hitFlash: 0,
          };
        }

        // 雑魚出現(WARNING以降は打ち止め)
        if (phase === "zako" && now >= spawnAt) {
          spawnEnemy();
          spawnAt = now + 380 + Math.random() * 320;
        }
        enemies.forEach(e => {
          e.y += e.vy;
          e.x += Math.sin(now / 400 + e.ph) * (e.type === 0 ? 1.1 : 1.8);
        });
        enemies = enemies.filter(e => e.y < H + 60);

        // 自弾 vs 雑魚
        for (const b of bullets) {
          for (const e of enemies) {
            if (!e.dead && Math.abs(b.x - e.x) < e.size * 0.6 && Math.abs(b.y - e.y) < e.size * 0.6) {
              e.dead = true; b.hit = true;
              score += 100;
              explode(e.x, e.y, "#7cffb0");
            }
          }
        }
        bullets = bullets.filter(b => !b.hit);
        enemies = enemies.filter(e => !e.dead);

        // 雑魚 vs 自機
        for (const e of enemies) {
          if (Math.hypot(e.x - player.x, e.y - player.y) < e.size * 0.5 + 14) {
            kill("SHOT DOWN BY ENEMY FIGHTER");
            return;
          }
        }

        // ボス
        if (boss) {
          const targetY = H * 0.26;
          if (!boss.arrived) {
            boss.y += (targetY - boss.y) * 0.06 + 2.2;
            shake = Math.max(shake, 5);
            if (boss.y >= targetY - 4) {
              boss.arrived = now;
              boss.fireAt = now + 700;
            }
          } else {
            boss.y = targetY + Math.sin(now / 500) * 8;
            const by = boss.y + boss.size * 0.2;

            if (boss.rage === 0) {
              // 希望フェーズ: 放射弾のみ(ちゃんと避けられる)。撃てば HP が実際に減る
              if (now >= boss.fireAt) {
                boss.fireAt = now + 300;
                const base = Math.random() * Math.PI;
                for (let i = 0; i < 14; i++) {
                  const a = base + (i / 14) * Math.PI * 2;
                  ebullets.push({ x: W / 2, y: by, vx: Math.cos(a) * 3, vy: Math.sin(a) * 3 });
                }
              }
            } else if (boss.rage === 1) {
              // 勝利の錯覚: 攻撃が止み、バーは残りわずかのまま。0.7秒後に溜め始める
              // (HPは減ったまま=「あと一撃だったのに」で再挑戦したくなる)
              if (now - boss.rageAt > 700) {
                boss.rage = 2;
                boss.rageAt = now;
                shake = Math.max(shake, 10);
              }
            } else if (boss.rage === 2) {
              // チャージ: 自機を狙う照準を出しつつエネルギーを溜める(約1秒)→ 発射
              shake = Math.max(shake, (now - boss.rageAt) / 130);
              if (now - boss.rageAt > 1000) {
                boss.rage = 3;
                boss.rageAt = now;
                // 発射の瞬間に自機位置へロック → 直線ビーム
                boss.beamOx = W / 2; boss.beamOy = by;
                boss.beamAng = Math.atan2(player.y - by, player.x - W / 2);
                shake = 32; flashA = 0.7;
              }
            } else if (boss.rage === 3) {
              // 発射中: ビーム持続。約0.6秒後、避けられていたら弾幕フェーズへ
              if (now - boss.rageAt > 600) {
                boss.rage = 4;
                boss.rageAt = now;
                boss.fireAt = now;
                shake = Math.max(shake, 14);
              }
            } else {
              // 回避不能弾幕: 回転する高密度リング + 自機狙い弾を連射(逃げ場なし)
              if (now >= boss.fireAt) {
                boss.fireAt = now + 110;
                const base = (now / 200) % (Math.PI * 2);
                for (let i = 0; i < 20; i++) {
                  const a = base + (i / 20) * Math.PI * 2;
                  ebullets.push({ x: W / 2, y: by, vx: Math.cos(a) * 3.2, vy: Math.sin(a) * 3.2 });
                }
                // 自機狙い(2発)で隙間を詰める
                const aim = Math.atan2(player.y - by, player.x - W / 2);
                for (const off of [-0.12, 0.12]) {
                  ebullets.push({ x: W / 2, y: by, vx: Math.cos(aim + off) * 4, vy: Math.sin(aim + off) * 4 });
                }
              }
            }
          }

          // 自弾 vs ボス / バリア
          for (const b of bullets) {
            const dObj = Math.hypot(b.x - W / 2, b.y - boss.y);
            if (boss.barrier) {
              // バリア展開中: ダメージ無効。表面で弾けて火花(手応えは出す)
              if (dObj < boss.size * 0.5) {
                b.hit = true;
                score += 10;
                explode(b.x, b.y, "#aaffcf", 5);
              }
            } else if (dObj < boss.size * 0.35) {
              // 直接被弾: 白フラッシュ + HP が減る。残りわずかで発狂トリガー
              b.hit = true;
              score += 10;
              explode(b.x, b.y, "#c8ffe3", 4);
              boss.hitFlash = now;
              boss.hp -= 0.008;
              if (boss.hp <= 0.18) {
                boss.rage = 1;
                boss.rageAt = now;
                boss.hp = 0.05;          // バーをほぼ空に見せて「勝てた」と錯覚させる
                boss.barrier = true;     // 同時にバリア展開(以降ダメージ無効の理由づけ)
                boss.barrierAt = now;
              }
            }
          }
          bullets = bullets.filter(b => !b.hit);

          // 理不尽ビームの直撃判定(発射直後は少し猶予してビームを見せてから殺す)
          if (boss.rage === 3 && now - boss.rageAt > 90) {
            const dx = Math.cos(boss.beamAng), dy = Math.sin(boss.beamAng);
            const rx = player.x - boss.beamOx, ry = player.y - boss.beamOy;
            const proj = rx * dx + ry * dy;                // ビーム方向の距離
            const perp = Math.abs(rx * dy - ry * dx);      // ビーム軸からの横ずれ
            if (proj > 0 && perp < 26) {
              kill("ANNIHILATED BY WPY CANNON");
              return;
            }
          }
        }

        // 敵弾(放射弾)
        for (const b of ebullets) {
          b.x += b.vx; b.y += b.vy;
          if (Math.hypot(b.x - player.x, b.y - player.y) < 16) {
            kill("DESTROYED BY GIANT WPY");
            return;
          }
        }
        ebullets = ebullets.filter(b => b.x > -30 && b.x < W + 30 && b.y > -30 && b.y < H + 30);
      }

      /* ---------- drawing ---------- */
      function drawStars(speed) {
        ctx.fillStyle = "#9fffc9";
        for (const s of stars) {
          s.y += (s.s * speed) / H;
          if (s.y > 1) { s.y -= 1; s.x = Math.random(); }
          ctx.globalAlpha = 0.15 + s.s * 0.25;
          ctx.fillRect(s.x * W, s.y * H, s.s, s.s * 2.5);
        }
        ctx.globalAlpha = 1;
      }

      function drawShip() {
        const tilt = Math.max(-0.35, Math.min(0.35, (player.x - player.px) * 0.03));
        player.px = player.x;
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(tilt);

        // エンジン炎
        ctx.fillStyle = Math.random() > 0.5 ? "#eafff2" : "#7cffb0";
        const fl = 8 + Math.random() * 10;
        ctx.beginPath();
        ctx.moveTo(-4, 16); ctx.lineTo(4, 16); ctx.lineTo(0, 16 + fl);
        ctx.closePath(); ctx.fill();

        // 機体(戦闘機シルエット)
        ctx.beginPath();
        ctx.moveTo(0, -22);        // 機首
        ctx.lineTo(4, -8);
        ctx.lineTo(19, 8);         // 右翼端
        ctx.lineTo(19, 12);
        ctx.lineTo(6, 10);
        ctx.lineTo(4, 17);         // 右尾翼
        ctx.lineTo(0, 14);
        ctx.lineTo(-4, 17);        // 左尾翼
        ctx.lineTo(-6, 10);
        ctx.lineTo(-19, 12);
        ctx.lineTo(-19, 8);        // 左翼端
        ctx.lineTo(-4, -8);
        ctx.closePath();
        ctx.fillStyle = "#baffd6";
        ctx.shadowColor = "#7cffb0";
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0;

        // コックピット
        ctx.beginPath();
        ctx.ellipse(0, -8, 2.6, 5.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = "#0e5c33";
        ctx.fill();

        ctx.restore();
      }

      function drawEnemy(e) {
        ctx.save();
        ctx.translate(e.x, e.y);
        const s = e.size / 24;
        ctx.shadowColor = "#7cffb0";
        ctx.shadowBlur = 8;
        if (e.type === 0) {
          // ダート型: 下向きの矢じり
          ctx.scale(s, s);
          ctx.beginPath();
          ctx.moveTo(0, 13);
          ctx.lineTo(5, 2);
          ctx.lineTo(12, -3);
          ctx.lineTo(6, -5);
          ctx.lineTo(4, -11);
          ctx.lineTo(-4, -11);
          ctx.lineTo(-6, -5);
          ctx.lineTo(-12, -3);
          ctx.lineTo(-5, 2);
          ctx.closePath();
          ctx.fillStyle = "#2fae6e";
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = "#c8ffe3";
          ctx.fillRect(-1.5, -3, 3, 5);
        } else {
          // ドローン型: 回転するひし形
          ctx.rotate(now / 600 + e.ph);
          ctx.scale(s, s);
          ctx.beginPath();
          ctx.moveTo(0, -11); ctx.lineTo(11, 0); ctx.lineTo(0, 11); ctx.lineTo(-11, 0);
          ctx.closePath();
          ctx.fillStyle = "#1e8a55";
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = "#7cffb0";
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.fillStyle = "#c8ffe3";
          ctx.fillRect(-2.5, -2.5, 5, 5);
        }
        ctx.restore();
      }

      function drawBossUI() {
        const bw = Math.min(W * 0.62, 430);
        const bx = (W - bw) / 2, by = H * 0.085;
        ctx.textAlign = "center";
        ctx.font = `${Math.min(W, H) * 0.024}px ${FONT}`;
        ctx.fillStyle = "#aaffcf";
        ctx.fillText("GIANT WPY", W / 2, by - 8);
        ctx.strokeStyle = "rgba(170,255,207,0.8)";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(bx, by, bw, 10);
        ctx.fillStyle = "#7cffb0";
        ctx.fillRect(bx + 1.5, by + 1.5, (bw - 3) * boss.hp, 7);
      }

      // 溜め演出 & 理不尽ビームの描画
      function drawBossRage() {
        if (!boss) return;
        // バリア(展開中はダメージ無効。撃つと火花で弾ける)
        if (boss.barrier) {
          const fade = Math.min(1, (now - boss.barrierAt) / 300);
          const R = boss.size * 0.5;
          const pulse = 0.5 + 0.5 * Math.sin(now / 160);
          ctx.save();
          ctx.globalAlpha = fade * (0.16 + pulse * 0.12);
          ctx.fillStyle = "#7cffb0";
          ctx.beginPath(); ctx.arc(W / 2, boss.y, R, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = fade * (0.5 + pulse * 0.4);
          ctx.strokeStyle = "#c8ffe3";
          ctx.lineWidth = 2;
          ctx.shadowColor = "#7cffb0"; ctx.shadowBlur = 16;
          ctx.beginPath(); ctx.arc(W / 2, boss.y, R, 0, Math.PI * 2); ctx.stroke();
          ctx.restore();
        }
        if (boss.rage === 2) {
          // チャージ: 自機を狙う照準ライン + 溜まっていくエネルギー球
          const ox = W / 2, oy = boss.y + boss.size * 0.2;
          const p = Math.min(1, (now - boss.rageAt) / 1000);
          ctx.save();
          ctx.strokeStyle = `rgba(180,255,210,${0.12 + p * 0.55})`;
          ctx.lineWidth = 1 + p * 2;
          ctx.setLineDash([6, 10]);
          ctx.beginPath();
          ctx.moveTo(ox, oy); ctx.lineTo(player.x, player.y); ctx.stroke();
          ctx.restore();
          const r = 4 + p * Math.min(W, H) * 0.05 + Math.random() * 3;
          ctx.beginPath();
          ctx.arc(ox, oy, r, 0, Math.PI * 2);
          ctx.fillStyle = "#eafff2";
          ctx.shadowColor = "#7cffb0";
          ctx.shadowBlur = 20 + p * 30;
          ctx.fill();
          ctx.shadowBlur = 0;
        } else if (boss.rage === 3) {
          // 発射: ロックした方向へ直線ビーム
          const ox = boss.beamOx, oy = boss.beamOy;
          const dx = Math.cos(boss.beamAng), dy = Math.sin(boss.beamAng);
          const len = Math.hypot(W, H) * 1.2;
          const ex = ox + dx * len, ey = oy + dy * len;
          const flick = 0.82 + Math.random() * 0.18;
          ctx.save();
          ctx.lineCap = "round";
          ctx.strokeStyle = `rgba(124,255,176,${0.5 * flick})`;
          ctx.lineWidth = 52 * flick;
          ctx.shadowColor = "#7cffb0";
          ctx.shadowBlur = 40;
          ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke();
          ctx.shadowBlur = 0;
          ctx.strokeStyle = `rgba(234,255,242,${flick})`;
          ctx.lineWidth = 22 * flick;
          ctx.beginPath(); ctx.moveTo(ox, oy); ctx.lineTo(ex, ey); ctx.stroke();
          ctx.restore();
        }
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        ctx.save();
        if (shake > 0.5) {
          ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
          shake *= 0.88;
        }

        const scroll = state === "play" || state === "dying" ? 3.2 : 0.7;
        drawStars(scroll);

        if (state === "ready") {
          ctx.fillStyle = "#aaffcf";
          ctx.textAlign = "center";
          ctx.font = `${Math.min(W, H) * 0.07}px ${FONT}`;
          ctx.fillText("STAGE 1", W / 2, H * 0.42);
          if (Math.floor(now / 300) % 2) {
            ctx.font = `${Math.min(W, H) * 0.036}px ${FONT}`;
            ctx.fillText("READY?", W / 2, H * 0.5);
          }
          ctx.font = `${Math.min(W, H) * 0.018}px ${FONT}`;
          ctx.fillStyle = "rgba(170,255,207,0.6)";
          ctx.fillText("MOVE: DRAG / ARROW KEYS", W / 2, H * 0.58);
          drawShip();
          if (now - readyAt > 1600) beginPlay();
        }

        if (state === "play" || state === "dying") {
          // 雑魚
          for (const e of enemies) drawEnemy(e);

          // 自弾
          ctx.fillStyle = "#eafff2";
          for (const b of bullets) ctx.fillRect(b.x - 2, b.y - 8, 4, 12);

          // ボス
          if (boss && bossImg) {
            ctx.save();
            ctx.translate(W / 2, boss.y);
            ctx.rotate(Math.sin(now / 300) * 0.04);
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(bossImg, -boss.size / 2, -boss.size / 2, boss.size, boss.size);
            // 被弾フラッシュ: 白シルエットを一瞬重ねてピカッと光らせる
            if (bossFlashImg && now - boss.hitFlash < 90) {
              ctx.globalAlpha = 0.85 * (1 - (now - boss.hitFlash) / 90);
              ctx.drawImage(bossFlashImg, -boss.size / 2, -boss.size / 2, boss.size, boss.size);
              ctx.globalAlpha = 1;
            }
            ctx.restore();
            drawBossUI();
          }
          if (boss) drawBossRage();

          // 敵弾(放射弾)
          for (const b of ebullets) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = "#9fffc9";
            ctx.shadowColor = "#9fffc9";
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
          }

          // WARNING 演出
          if (state === "play" && phase === "warning") {
            const blink = Math.floor(now / 220) % 2;
            ctx.fillStyle = `rgba(111,255,168,${blink ? 0.12 : 0.04})`;
            ctx.fillRect(0, H * 0.3, W, H * 0.32);
            if (blink) {
              ctx.textAlign = "center";
              ctx.font = `${Math.min(W, H) * 0.075}px ${FONT}`;
              ctx.fillStyle = "#eafff2";
              ctx.shadowColor = "#7cffb0";
              ctx.shadowBlur = 24;
              ctx.fillText("WARNING!", W / 2, H * 0.44);
              ctx.shadowBlur = 0;
            }
            ctx.textAlign = "center";
            ctx.font = `${Math.min(W, H) * 0.016}px ${FONT}`;
            ctx.fillStyle = "#9fffc9";
            ctx.fillText("A HUGE WPY IS APPROACHING FAST", W / 2, H * 0.52);
          }

          if (state === "play") drawShip();

          // HUD
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
          ctx.font = `${Math.min(W, H) * 0.02}px ${FONT}`;
          ctx.fillStyle = "rgba(170,255,207,0.9)";
          ctx.fillText("1UP  " + pad(score), W * 0.05, H * 0.055);
          ctx.textAlign = "right";
          ctx.fillText("HI-SCORE  300000", W * 0.95, H * 0.055);
        }

        // パーティクル
        for (const p of particles) {
          p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.life--;
          ctx.globalAlpha = Math.max(0, Math.min(1, p.life / 30));
          ctx.fillStyle = p.c;
          ctx.fillRect(p.x - p.s / 2, p.y - p.s / 2, p.s, p.s);
        }
        ctx.globalAlpha = 1;
        particles = particles.filter(p => p.life > 0);

        // 被弾フラッシュ
        if (flashA > 0.01) {
          ctx.fillStyle = `rgba(255,255,255,${flashA})`;
          ctx.fillRect(-30, -30, W + 60, H + 60);
          flashA *= 0.85;
        }

        ctx.restore();
      }

      /* ---------- main loop ---------- */
      function frame(t) {
        now = t;
        last = t;
        if (state === "play") updatePlay();
        draw();
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
</body>

</html>
