<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>wpy</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #060d09;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    #root {
      position: fixed; inset: 0;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 45%, #10231a 0%, #060d09 75%);
      color: #6fffa8;
      font-family: "Courier New", ui-monospace, monospace;
      text-align: center;
      cursor: pointer;
      touch-action: none;
    }

    #game { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3.2vmin;
      pointer-events: none;
      z-index: 3;
    }
    .hidden { display: none; }

    .scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0) 0px, rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.28) 3px, rgba(0, 0, 0, 0.28) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    #title { animation: flicker 4s steps(2) infinite; }
    @keyframes flicker { 0%, 96% { opacity: 1; } 98% { opacity: 0.88; } 100% { opacity: 1; } }

    .hud {
      position: absolute; top: 3.5%; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 0 5%;
      font-size: clamp(11px, 2.4vmin, 18px);
      letter-spacing: 0.2em;
      opacity: 0.85;
    }
    .logo {
      font-size: clamp(64px, 20vmin, 220px);
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1;
      color: #aaffcf;
      text-shadow:
        0 0 8px rgba(111, 255, 168, 0.9),
        0 0 32px rgba(111, 255, 168, 0.45),
        4px 4px 0 #0e5c33;
      animation: logo-pulse 2.4s ease-in-out infinite;
    }
    @keyframes logo-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    .sub {
      font-size: clamp(12px, 3vmin, 24px);
      letter-spacing: 0.45em;
      text-indent: 0.45em;
      opacity: 0.9;
    }
    .press {
      font-size: clamp(13px, 3.2vmin, 26px);
      letter-spacing: 0.3em;
      text-indent: 0.3em;
      animation: blink 1.1s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
    .coin {
      font-size: clamp(10px, 2.2vmin, 15px);
      letter-spacing: 0.3em;
      opacity: 0.55;
    }
    .copyright {
      position: absolute; bottom: 3.5%; left: 0; right: 0;
      font-size: clamp(10px, 2.2vmin, 16px);
      letter-spacing: 0.25em;
      opacity: 0.6;
    }
    .walker {
      position: absolute; bottom: 11%; left: 0;
      width: clamp(40px, 9vmin, 80px);
      image-rendering: pixelated;
      filter: invert(1) sepia(1) saturate(4) hue-rotate(75deg) brightness(1.15);
      animation: walk 13s linear infinite, hop 0.45s steps(2) infinite;
      z-index: 2;
    }
    @keyframes walk { from { transform: translateX(-15vmin); } to { transform: translateX(105vw); } }
    @keyframes hop { 50% { margin-bottom: 1.4vmin; } }

    #gameover .go-main {
      font-size: clamp(38px, 11vmin, 120px);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #ff6b6b;
      text-shadow: 0 0 12px rgba(255, 107, 107, 0.8), 3px 3px 0 #5c0e0e;
    }
    #gameover .go-cause {
      font-size: clamp(13px, 3vmin, 24px);
      letter-spacing: 0.25em;
      color: #ffd7d7;
    }
    #gameover .go-score {
      font-size: clamp(13px, 3vmin, 24px);
      letter-spacing: 0.25em;
    }
    #gameover .go-tip {
      font-size: clamp(10px, 2.2vmin, 15px);
      letter-spacing: 0.2em;
      opacity: 0.6;
    }
    #gameover .go-continue {
      margin-top: 2vmin;
      font-size: clamp(14px, 3.4vmin, 28px);
      letter-spacing: 0.3em;
      animation: blink 1.1s steps(1) infinite;
    }

    .zap { animation: zap-flash 0.35s steps(2); }
    @keyframes zap-flash { 0% { filter: invert(1); } 100% { filter: none; } }
  </style>
</head>

<body>
  <div id="root">
    <canvas id="game"></canvas>

    <div id="title" class="overlay">
      <div class="hud"><span id="t-score">1UP&nbsp;&nbsp;000000</span><span>HI-SCORE&nbsp;&nbsp;300000</span></div>
      <div class="logo">WPY</div>
      <div class="sub">GALACTIC WARP SHOOTING</div>
      <div class="press">PRESS START</div>
      <div class="coin">INSERT COIN — TAP ANYWHERE</div>
      <div class="copyright">&copy; 2026 WPY CO.,LTD. &nbsp; CREDIT <span id="credit">00</span></div>
      <img class="walker" src="favicon.png" alt="">
    </div>

    <div id="gameover" class="overlay hidden">
      <div class="go-main">GAME OVER</div>
      <div class="go-cause" id="go-cause"></div>
      <div class="go-score" id="go-score"></div>
      <div class="go-tip" id="go-tip"></div>
      <div class="go-continue">CONTINUE? <span id="go-count">9</span></div>
    </div>

    <div class="scanlines"></div>
  </div>

  <script>
    (() => {
      const root = document.getElementById("root");
      const cv = document.getElementById("game");
      const ctx = cv.getContext("2d");
      const titleEl = document.getElementById("title");
      const goEl = document.getElementById("gameover");
      const el = id => document.getElementById(id);

      /* ---------- canvas setup ---------- */
      let W = 0, H = 0, dpr = 1;
      function resize() {
        dpr = Math.min(devicePixelRatio || 1, 2);
        W = root.clientWidth; H = root.clientHeight;
        cv.width = W * dpr; cv.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      addEventListener("resize", resize);

      /* ---------- sprites ---------- */
      const icon = new Image();
      icon.src = "favicon.png";
      function tint(color) {
        const c = document.createElement("canvas");
        c.width = c.height = 64;
        const g = c.getContext("2d");
        g.drawImage(icon, 0, 0);
        g.globalCompositeOperation = "source-in";
        g.fillStyle = color;
        g.fillRect(0, 0, 64, 64);
        return c;
      }
      let shipImg = null, bossImg = null;
      function buildSprites() {
        shipImg = tint("#baffd6");
        bossImg = tint("#7cffb0");
      }
      if (icon.complete) buildSprites();
      else icon.onload = buildSprites;

      /* ---------- state ---------- */
      let state = "title";       // title | ready | play | dying | gameover
      let now = 0, last = 0;
      let credits = 0, lastScore = 0;

      const stars = [];
      for (let i = 0; i < 90; i++) {
        stars.push({ x: Math.random(), y: Math.random(), s: 0.4 + Math.random() * 1.8 });
      }

      const player = { x: 0, y: 0, vx: 0, vy: 0, w: 46 };
      let bullets = [], enemies = [], ebullets = [], particles = [], score = 0;
      let tPlay, deathAt, deathMode, fireAt, spawnAt;
      let boss, wall, warpAt, shake, flashA, dieAt, readyAt, goShownAt;
      let goTimer = null;

      const CAUSES = ["DESTROYED BY GIANT WPY", "WARP MALFUNCTION", "CRUSHED BY THE WALL"];
      const TIPS = [
        "TIP: YOU CANNOT WIN.",
        "TIP: TRY AGAIN. RESULT IS SAME.",
        "TIP: THE ENDING DOES NOT EXIST.",
        "TIP: THE WALL HAS NO GAP.",
        "TIP: YOUR EFFORT WAS RECORDED. NOWHERE.",
        "TIP: WARP IS NOT A SAFE TECHNOLOGY.",
      ];

      const pad = (n, l = 6) => String(Math.min(n, 999999)).padStart(l, "0");

      /* ---------- flow ---------- */
      function startGame() {
        credits = Math.min(credits + 1, 99);
        el("credit").textContent = pad(credits, 2);
        root.classList.remove("zap");
        void root.offsetWidth;
        root.classList.add("zap");

        titleEl.classList.add("hidden");
        bullets = []; enemies = []; ebullets = []; particles = [];
        score = 0; shake = 0; flashA = 0;
        boss = null; wall = null;
        player.x = W / 2; player.y = H * 0.8; player.vx = 0; player.vy = 0;
        state = "ready";
        readyAt = now;
      }

      function beginPlay() {
        state = "play";
        tPlay = now;
        fireAt = now; spawnAt = now + 600;
        deathMode = Math.floor(Math.random() * 3);
        deathAt = now + 2500 + Math.random() * 1500;
        warpAt = 0;
      }

      function kill(cause) {
        if (state !== "play") return;
        state = "dying";
        dieAt = now;
        shake = 22;
        flashA = 0.9;
        lastScore = score;
        // 自機爆発
        for (let i = 0; i < 42; i++) {
          const a = Math.random() * Math.PI * 2, v = 1 + Math.random() * 6;
          particles.push({
            x: player.x, y: player.y,
            vx: Math.cos(a) * v, vy: Math.sin(a) * v,
            life: 40 + Math.random() * 40,
            c: ["#aaffcf", "#ffffff", "#ffb347", "#ff6b6b"][i % 4],
            s: 2 + Math.random() * 4,
          });
        }
        setTimeout(() => showGameOver(cause), 1300);
      }

      function showGameOver(cause) {
        state = "gameover";
        goShownAt = now;
        el("go-cause").textContent = cause;
        el("go-score").textContent = "SCORE  " + pad(score);
        el("go-tip").textContent = TIPS[Math.floor(Math.random() * TIPS.length)];
        goEl.classList.remove("hidden");
        let count = 9;
        el("go-count").textContent = count;
        clearInterval(goTimer);
        goTimer = setInterval(() => {
          count--;
          if (count < 0) { backToTitle(); return; }
          el("go-count").textContent = count;
        }, 1000);
      }

      function backToTitle() {
        clearInterval(goTimer);
        goEl.classList.add("hidden");
        el("t-score").innerHTML = "1UP&nbsp;&nbsp;" + pad(lastScore);
        titleEl.classList.remove("hidden");
        state = "title";
      }

      /* ---------- input ---------- */
      const keys = {};
      addEventListener("keydown", e => {
        keys[e.key] = true;
        if (state === "title" && (e.key === " " || e.key === "Enter")) startGame();
        else if (state === "gameover" && now - goShownAt > 600 && (e.key === " " || e.key === "Enter")) backToTitle();
      });
      addEventListener("keyup", e => { keys[e.key] = false; });

      let dragging = false, lastPX = 0, lastPY = 0;
      root.addEventListener("pointerdown", e => {
        e.preventDefault();
        if (state === "title") { startGame(); return; }
        if (state === "gameover" && now - goShownAt > 600) { backToTitle(); return; }
        dragging = true;
        lastPX = e.clientX; lastPY = e.clientY;
      });
      root.addEventListener("pointermove", e => {
        if (state !== "play") return;
        if (e.pointerType === "mouse" && !dragging) {
          // マウスは追従
          player.x += (e.clientX - player.x) * 0.3;
          player.y += (Math.max(e.clientY, H * 0.45) - player.y) * 0.3;
        } else if (dragging) {
          // タッチはドラッグ量で相対移動(指で隠れないように)
          player.x += (e.clientX - lastPX) * 1.5;
          player.y += (e.clientY - lastPY) * 1.5;
          lastPX = e.clientX; lastPY = e.clientY;
        }
      });
      addEventListener("pointerup", () => { dragging = false; });
      addEventListener("pointercancel", () => { dragging = false; });

      /* ---------- game logic ---------- */
      function spawnEnemy() {
        const ch = "WPY"[Math.floor(Math.random() * 3)];
        enemies.push({
          ch,
          x: 40 + Math.random() * (W - 80),
          y: -30,
          vy: 1.4 + Math.random() * 1.6,
          ph: Math.random() * Math.PI * 2,
          size: 26 + Math.random() * 14,
        });
      }

      function explode(x, y, color, n = 14) {
        for (let i = 0; i < n; i++) {
          const a = Math.random() * Math.PI * 2, v = 0.5 + Math.random() * 4;
          particles.push({
            x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
            life: 20 + Math.random() * 25, c: color, s: 1.5 + Math.random() * 3,
          });
        }
      }

      function triggerDeathEvent() {
        if (deathMode === 0) {
          // 巨大WPY: 完全ホーミング弾つき弾幕
          boss = { y: -Math.min(W, H) * 0.6, size: Math.min(W, H) * 0.55, fireAt: now + 900, entered: now };
        } else if (deathMode === 1) {
          // ワープ誤作動
          warpAt = now + 900;
        } else {
          // 隙間のない壁
          wall = { y: -90, h: 80, vy: Math.max(4.5, H * 0.008) };
        }
        deathAt = Infinity;
      }

      function updatePlay(dt) {
        // キー移動
        const sp = 6;
        if (keys.ArrowLeft || keys.a) player.x -= sp;
        if (keys.ArrowRight || keys.d) player.x += sp;
        if (keys.ArrowUp || keys.w) player.y -= sp;
        if (keys.ArrowDown || keys.s) player.y += sp;
        player.x = Math.max(24, Math.min(W - 24, player.x));
        player.y = Math.max(H * 0.4, Math.min(H - 40, player.y));

        // ワープ誤作動: 直前はガタガタ震える
        if (warpAt && now > warpAt - 500) {
          player.x += (Math.random() - 0.5) * 14;
          player.y += (Math.random() - 0.5) * 14;
          if (now >= warpAt) {
            player.x = W / 2; player.y = H * 0.16;
            for (let i = 0; i < 7; i++) {
              const a = (i / 7) * Math.PI * 2;
              enemies.push({ ch: "WPY"[i % 3], x: player.x + Math.cos(a) * 46, y: player.y + Math.sin(a) * 46, vy: 0, ph: 0, size: 34 });
            }
            explode(player.x, player.y, "#8ecae6", 24);
            kill(CAUSES[1]);
            return;
          }
        }

        // 自動連射
        if (now >= fireAt) {
          bullets.push({ x: player.x, y: player.y - 26 });
          fireAt = now + 140;
        }
        bullets.forEach(b => b.y -= 10);
        bullets = bullets.filter(b => b.y > -20);

        // 敵出現
        if (now >= spawnAt) { spawnEnemy(); spawnAt = now + 420 + Math.random() * 300; }
        enemies.forEach(e => { e.y += e.vy; e.x += Math.sin(now / 400 + e.ph) * 1.2; });
        enemies = enemies.filter(e => e.y < H + 60);

        // 弾 vs 敵
        for (const b of bullets) {
          for (const e of enemies) {
            if (!e.dead && Math.abs(b.x - e.x) < e.size * 0.55 && Math.abs(b.y - e.y) < e.size * 0.55) {
              e.dead = true; b.hit = true;
              score += 100;
              explode(e.x, e.y, "#7cffb0");
            }
          }
        }
        bullets = bullets.filter(b => !b.hit);
        enemies = enemies.filter(e => !e.dead);

        // 敵 vs 自機
        for (const e of enemies) {
          if (Math.hypot(e.x - player.x, e.y - player.y) < e.size * 0.5 + 16) {
            kill("SHOT DOWN BY LETTER “" + e.ch + "”");
            return;
          }
        }

        // 死亡イベント発動
        if (now >= deathAt) triggerDeathEvent();

        // 巨大WPY
        if (boss) {
          const targetY = H * 0.24;
          if (boss.y < targetY) boss.y += (targetY - boss.y) * 0.08 + 2;
          shake = Math.max(shake, 6);
          if (now >= boss.fireAt) {
            boss.fireAt = now + 260;
            // 放射弾幕
            for (let i = 0; i < 16; i++) {
              const a = (i / 16) * Math.PI * 2 + Math.random() * 0.2;
              ebullets.push({ x: W / 2, y: boss.y, vx: Math.cos(a) * 3.2, vy: Math.sin(a) * 3.2, homing: false });
            }
            // 完全ホーミング弾(逃げられない)
            ebullets.push({ x: W / 2, y: boss.y, vx: 0, vy: 4, homing: true });
          }
        }
        for (const b of ebullets) {
          if (b.homing) {
            const dx = player.x - b.x, dy = player.y - b.y;
            const d = Math.hypot(dx, dy) || 1;
            b.vx = (dx / d) * 5.2; b.vy = (dy / d) * 5.2;
          }
          b.x += b.vx; b.y += b.vy;
          if (Math.hypot(b.x - player.x, b.y - player.y) < 18) {
            kill(CAUSES[0]);
            return;
          }
        }
        ebullets = ebullets.filter(b => b.x > -30 && b.x < W + 30 && b.y > -30 && b.y < H + 30);

        // 壁
        if (wall) {
          wall.y += wall.vy;
          shake = Math.max(shake, 3);
          // 弾は壁に弾かれる
          for (const b of bullets) {
            if (b.y < wall.y + wall.h) { b.hit = true; explode(b.x, wall.y + wall.h, "#ffd166", 4); }
          }
          bullets = bullets.filter(b => !b.hit);
          if (wall.y + wall.h >= player.y - 18) {
            kill(CAUSES[2]);
            return;
          }
        }
      }

      /* ---------- drawing ---------- */
      function drawStars(speed) {
        ctx.fillStyle = "#9fffc9";
        for (const s of stars) {
          s.y += (s.s * speed) / H;
          if (s.y > 1) { s.y -= 1; s.x = Math.random(); }
          ctx.globalAlpha = 0.15 + s.s * 0.25;
          ctx.fillRect(s.x * W, s.y * H, s.s, s.s * 2.5);
        }
        ctx.globalAlpha = 1;
      }

      function drawShip() {
        if (!shipImg) return;
        ctx.save();
        ctx.translate(player.x, player.y);
        // エンジン炎
        ctx.fillStyle = Math.random() > 0.5 ? "#ffd166" : "#ff8c42";
        const fl = 8 + Math.random() * 10;
        ctx.beginPath();
        ctx.moveTo(-5, 20); ctx.lineTo(5, 20); ctx.lineTo(0, 20 + fl);
        ctx.closePath(); ctx.fill();
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(shipImg, -player.w / 2, -player.w / 2, player.w, player.w);
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        ctx.save();
        if (shake > 0.5) {
          ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
          shake *= 0.88;
        }

        const scroll = state === "play" || state === "dying" ? 3.2 : 0.7;
        drawStars(scroll);

        if (state === "ready") {
          ctx.fillStyle = "#aaffcf";
          ctx.textAlign = "center";
          ctx.font = `700 ${Math.min(W, H) * 0.09}px "Courier New", monospace`;
          ctx.fillText("STAGE 1", W / 2, H * 0.42);
          if (Math.floor(now / 300) % 2) {
            ctx.font = `700 ${Math.min(W, H) * 0.045}px "Courier New", monospace`;
            ctx.fillText("READY?", W / 2, H * 0.5);
          }
          ctx.font = `${Math.min(W, H) * 0.026}px "Courier New", monospace`;
          ctx.fillStyle = "rgba(170,255,207,0.6)";
          ctx.fillText("MOVE: DRAG / ARROW KEYS", W / 2, H * 0.58);
          drawShip();
          if (now - readyAt > 1600) beginPlay();
        }

        if (state === "play" || state === "dying") {
          // 敵(WPYの文字)
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          for (const e of enemies) {
            ctx.font = `700 ${e.size}px "Courier New", monospace`;
            ctx.fillStyle = "#7cffb0";
            ctx.shadowColor = "#7cffb0";
            ctx.shadowBlur = 12;
            ctx.fillText(e.ch, e.x, e.y);
            ctx.shadowBlur = 0;
          }

          // 自弾
          ctx.fillStyle = "#eafff2";
          for (const b of bullets) ctx.fillRect(b.x - 2, b.y - 8, 4, 12);

          // 敵弾
          for (const b of ebullets) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.homing ? 7 : 5, 0, Math.PI * 2);
            ctx.fillStyle = b.homing ? "#ff6b6b" : "#ffd166";
            ctx.shadowColor = ctx.fillStyle;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
          }

          // 巨大WPY
          if (boss && bossImg) {
            ctx.save();
            ctx.translate(W / 2, boss.y);
            ctx.rotate(Math.sin(now / 300) * 0.05);
            ctx.imageSmoothingEnabled = false;
            ctx.globalAlpha = 0.95;
            ctx.drawImage(bossImg, -boss.size / 2, -boss.size / 2, boss.size, boss.size);
            ctx.restore();
            ctx.textAlign = "center";
            ctx.font = `700 ${Math.min(W, H) * 0.035}px "Courier New", monospace`;
            ctx.fillStyle = "#ff6b6b";
            if (Math.floor(now / 250) % 2) ctx.fillText("!! GIANT WPY !!", W / 2, H * 0.08);
          }

          // 壁
          if (wall) {
            ctx.fillStyle = "#0e5c33";
            ctx.fillRect(0, wall.y, W, wall.h);
            ctx.fillStyle = "#ffd166";
            for (let x = -40; x < W + 40; x += 56) {
              ctx.save();
              ctx.translate(x, wall.y);
              ctx.beginPath();
              ctx.moveTo(0, 0); ctx.lineTo(28, 0); ctx.lineTo(0, wall.h);
              ctx.lineTo(-28, wall.h);
              ctx.closePath(); ctx.fill();
              ctx.restore();
            }
            ctx.font = `700 ${Math.min(28, wall.h * 0.5)}px "Courier New", monospace`;
            ctx.fillStyle = "#06170d";
            ctx.textAlign = "center";
            ctx.fillText("K E E P   O U T", W / 2, wall.y + wall.h / 2);
          }

          // ワープ警告
          if (warpAt && now > warpAt - 500 && state === "play") {
            ctx.textAlign = "center";
            ctx.font = `700 ${Math.min(W, H) * 0.08}px "Courier New", monospace`;
            ctx.fillStyle = Math.floor(now / 120) % 2 ? "#ff6b6b" : "#ffd166";
            ctx.fillText("WARP!!", W / 2, H * 0.45);
          }

          if (state === "play") drawShip();

          // HUD
          ctx.textAlign = "left";
          ctx.textBaseline = "alphabetic";
          ctx.font = `${Math.min(W, H) * 0.028}px "Courier New", monospace`;
          ctx.fillStyle = "rgba(170,255,207,0.9)";
          ctx.fillText("1UP  " + pad(score), W * 0.05, H * 0.055);
          ctx.textAlign = "right";
          ctx.fillText("HI-SCORE  300000", W * 0.95, H * 0.055);
        }

        // パーティクル
        for (const p of particles) {
          p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.life--;
          ctx.globalAlpha = Math.max(0, Math.min(1, p.life / 30));
          ctx.fillStyle = p.c;
          ctx.fillRect(p.x - p.s / 2, p.y - p.s / 2, p.s, p.s);
        }
        ctx.globalAlpha = 1;
        particles = particles.filter(p => p.life > 0);

        // 被弾フラッシュ
        if (flashA > 0.01) {
          ctx.fillStyle = `rgba(255,255,255,${flashA})`;
          ctx.fillRect(-30, -30, W + 60, H + 60);
          flashA *= 0.85;
        }

        ctx.restore();
      }

      /* ---------- main loop ---------- */
      function frame(t) {
        now = t;
        const dt = Math.min(t - last, 50);
        last = t;
        if (state === "play") updatePlay(dt);
        draw();
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
</body>

</html>
